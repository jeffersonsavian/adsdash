name: Deploy

on:
  workflow_dispatch: # só manual — build é feito localmente

jobs:
  deploy:
    name: Deploy to Swarm (manager01)
    runs-on: ubuntu-latest
    environment: DEPLOY_SSH_KEY

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar docker-compose.yml para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker/docker-compose.yml"
          target: "/opt/adsdash/"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u jeffersonsavian --password-stdin

            docker pull ghcr.io/jeffersonsavian/adsdash-app:latest
            docker pull ghcr.io/jeffersonsavian/adsdash-worker:latest

            docker run --rm \
              --env-file /opt/adsdash/.env \
              -e NODE_ENV=production \
              ghcr.io/jeffersonsavian/adsdash-app:latest \
              sh -c "node_modules/.bin/prisma migrate deploy"

            docker stack deploy \
              --with-registry-auth \
              --compose-file /opt/adsdash/docker-compose.yml \
              adsdash

            echo "✅ Deploy concluído em $(date)"
