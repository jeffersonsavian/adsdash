# docker/docker-compose.yml — AdsDash Stack for Docker Swarm
# Deploy: docker stack deploy --with-registry-auth -c docker-compose.yml adsdash
#
# As variáveis de ambiente são lidas do arquivo /opt/adsdash/.env no servidor.
# Nunca commitar o .env com valores reais.

version: '3.8'

services:
  app:
    image: ghcr.io/jeffersonsavian/adsdash-app:latest
    env_file:
      - /opt/adsdash/.env
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: "https://adsdash.decisaobuilder.com.br"
    networks:
      - traefik-public
      - internal
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 0s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.adsdash.rule=Host(`adsdash.decisaobuilder.com.br`)"
        - "traefik.http.routers.adsdash.entrypoints=websecure"
        - "traefik.http.routers.adsdash.tls.certresolver=letsencrypt"
        - "traefik.http.services.adsdash.loadbalancer.server.port=3000"
        - "traefik.http.routers.adsdash.middlewares=adsdash-headers"
        - "traefik.http.middlewares.adsdash-headers.headers.customresponseheaders.X-Frame-Options=SAMEORIGIN"
        - "traefik.http.middlewares.adsdash-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    image: ghcr.io/jeffersonsavian/adsdash-worker:latest
    env_file:
      - /opt/adsdash/.env
    environment:
      NODE_ENV: production
    networks:
      - internal
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s

  scheduler:
    image: ghcr.io/jeffersonsavian/adsdash-worker:latest
    env_file:
      - /opt/adsdash/.env
    environment:
      NODE_ENV: production
    command: >
      sh -c "while true; do
        echo '[Scheduler] Running at '$(date) &&
        pnpm scheduler &&
        echo '[Scheduler] Done, sleeping 3600s' &&
        sleep 3600;
      done"
    networks:
      - internal
    deploy:
      replicas: 1

networks:
  traefik-public:
    external: true
  internal:
    driver: overlay
